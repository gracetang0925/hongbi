<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教师后台 · 华文写作批改</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --teal:#0F6E56; --teal-light:#e6f4f1; --teal-dark:#0a5240;
  --gold:#B8860B; --gold-light:#fef7e0;
  --purple:#534AB7; --purple-light:#EEEDFE;
  --red:#c0392b; --red-light:#fff0f0;
  --green:#27ae60; --green-light:#eef8f2;
  --blue:#2980b9; --blue-light:#edf4fa;
  --bg:#f4f3f0; --card:#fff; --text:#1a1a1a; --muted:#888; --border:#e8e4dd;
  --sidebar:240px; --shadow:0 2px 12px rgba(0,0,0,.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);}

/* ── Login ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-box{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:min(90vw,380px);box-shadow:0 8px 40px rgba(0,0,0,.12);text-align:center;}
.login-box h1{color:var(--teal);font-size:1.6rem;margin-bottom:.3rem;}
.login-box p{color:var(--muted);font-size:.88rem;margin-bottom:1.8rem;}
.login-input{width:100%;padding:.85rem 1rem;border:2px solid var(--border);border-radius:10px;font-family:inherit;font-size:.95rem;margin-bottom:.9rem;outline:none;}
.login-input:focus{border-color:var(--teal);}
.login-btn{width:100%;padding:.9rem;background:var(--teal);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;}
.login-btn:hover{background:var(--teal-dark);}
.login-err{color:var(--red);font-size:.85rem;margin-top:.5rem;display:none;}

/* ── App layout ── */
.app{display:none;min-height:100vh;}
.topbar{
  position:fixed;top:0;left:0;right:0;height:56px;background:var(--teal);
  display:flex;align-items:center;padding:0 1.5rem;gap:1rem;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.topbar-title{color:#fff;font-weight:700;font-size:1rem;flex:1;}
.topbar-badge{background:rgba(255,255,255,.2);color:#fff;padding:.2rem .7rem;border-radius:12px;font-size:.8rem;}
.topbar-logout{background:none;border:1.5px solid rgba(255,255,255,.4);color:#fff;padding:.3rem .8rem;border-radius:8px;font-size:.82rem;font-family:inherit;cursor:pointer;}

.sidebar{
  position:fixed;top:56px;left:0;bottom:0;width:var(--sidebar);
  background:var(--card);border-right:1px solid var(--border);
  overflow-y:auto;z-index:50;
}
.nav-section{padding:.8rem .8rem .2rem;font-size:.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.nav-item{
  display:flex;align-items:center;gap:.7rem;padding:.65rem 1rem;
  cursor:pointer;font-size:.9rem;border-radius:8px;margin:.1rem .5rem;
  transition:background .15s;color:var(--text);
}
.nav-item:hover{background:var(--bg);}
.nav-item.active{background:var(--teal-light);color:var(--teal);font-weight:600;}
.nav-count{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:.05rem .45rem;font-size:.72rem;}

.main{margin-left:var(--sidebar);margin-top:56px;padding:1.5rem;min-height:calc(100vh - 56px);}

/* ── Pages ── */
.page{display:none;}
.page.active{display:block;}
.page-title{font-size:1.2rem;font-weight:700;margin-bottom:1.2rem;color:var(--text);}

/* ── Inbox tabs ── */
.tab-row{display:flex;gap:.5rem;margin-bottom:1.2rem;border-bottom:2px solid var(--border);padding-bottom:0;}
.tab-btn{
  padding:.55rem 1.1rem;border:none;background:none;font-family:inherit;
  font-size:.88rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;
  margin-bottom:-2px;transition:all .15s;
}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600;}

/* ── Submission cards ── */
.sub-list{display:flex;flex-direction:column;gap:.7rem;}
.sub-card{
  background:var(--card);border-radius:12px;padding:1rem 1.2rem;
  box-shadow:var(--shadow);cursor:pointer;transition:box-shadow .15s;
  border-left:4px solid var(--border);
}
.sub-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
.sub-card.pending{border-left-color:var(--gold);}
.sub-card.reviewed{border-left-color:var(--teal);}
.sub-card.returned{border-left-color:var(--green);}
.sub-card-top{display:flex;align-items:center;gap:.8rem;margin-bottom:.4rem;}
.sub-name{font-weight:600;font-size:.95rem;}
.sub-time{color:var(--muted);font-size:.78rem;margin-left:auto;}
.sub-draft-badge{padding:.15rem .55rem;border-radius:10px;font-size:.75rem;font-weight:600;}
.draft1-badge{background:var(--blue-light);color:var(--blue);}
.draft2-badge{background:var(--purple-light);color:var(--purple);}
.sub-mode{padding:.15rem .55rem;border-radius:10px;font-size:.74rem;background:var(--bg);color:var(--muted);}
.sub-preview{font-size:.85rem;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;}
.sub-scores{display:flex;gap:.5rem;margin-top:.5rem;}
.score-pill{padding:.15rem .55rem;border-radius:8px;font-size:.76rem;background:var(--teal-light);color:var(--teal);}
.status-tag{padding:.15rem .6rem;border-radius:10px;font-size:.75rem;font-weight:600;}
.tag-pending{background:var(--gold-light);color:var(--gold);}
.tag-reviewed{background:var(--teal-light);color:var(--teal);}
.tag-returned{background:var(--green-light);color:var(--green);}

/* ── Annotation modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;}
.modal-overlay.visible{display:flex;}
.modal-box{
  background:var(--bg);border-radius:16px;width:min(96vw,980px);
  margin:auto;padding:0;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);
}
.modal-header{
  display:flex;align-items:center;padding:1rem 1.3rem;background:var(--teal);color:#fff;gap:.8rem;
}
.modal-header h2{font-size:1rem;font-weight:700;flex:1;}
.modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;opacity:.8;}
.modal-close:hover{opacity:1;}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:500px;}
.modal-col{padding:1.3rem;overflow-y:auto;max-height:70vh;}
.modal-col:first-child{border-right:1px solid var(--border);}
.col-title{font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem;}

.essay-text{font-size:.95rem;line-height:2;white-space:pre-wrap;background:var(--card);padding:1rem;border-radius:10px;border:1px solid var(--border);}
.ai-feedback-box{font-size:.88rem;line-height:1.8;background:var(--teal-light);padding:1rem;border-radius:10px;color:#1a1a1a;}
.ai-feedback-box h3{color:var(--teal);font-size:.85rem;margin:.8rem 0 .3rem;}

/* Annotation form */
.anno-type-row{display:flex;gap:.5rem;margin-bottom:.8rem;flex-wrap:wrap;}
.anno-type-btn{
  padding:.35rem .8rem;border:1.5px solid var(--border);border-radius:20px;
  background:var(--card);font-family:inherit;font-size:.82rem;cursor:pointer;transition:all .15s;
}
.anno-type-btn.sel-语用{border-color:var(--purple);background:var(--purple-light);color:var(--purple);font-weight:600;}
.anno-type-btn.sel-逻辑{border-color:var(--gold);background:var(--gold-light);color:var(--gold);font-weight:600;}
.anno-type-btn.sel-文化{border-color:var(--red);background:var(--red-light);color:var(--red);font-weight:600;}
.anno-type-btn.sel-鼓励{border-color:var(--green);background:var(--green-light);color:var(--green);font-weight:600;}
.anno-type-btn.sel-其他{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:600;}

.anno-textarea{
  width:100%;padding:.85rem;border:1.5px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:.9rem;line-height:1.7;resize:vertical;min-height:90px;outline:none;
}
.anno-textarea:focus{border-color:var(--teal);}
.anno-add-btn{
  padding:.55rem 1.1rem;background:var(--teal);color:#fff;border:none;border-radius:8px;
  font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:.5rem;
}

/* Templates */
.template-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem;}
.template-chip{
  padding:.25rem .65rem;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;font-size:.78rem;cursor:pointer;transition:all .15s;
}
.template-chip:hover{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}

/* Annotation list */
.anno-list{margin-top:.8rem;display:flex;flex-direction:column;gap:.6rem;}
.anno-item{
  background:var(--card);border-radius:10px;padding:.75rem 1rem;
  border-left:3px solid var(--border);font-size:.88rem;line-height:1.6;
  position:relative;
}
.anno-item-type{font-size:.74rem;font-weight:600;margin-bottom:.25rem;}
.type-语用{color:var(--purple);}
.type-逻辑{color:var(--gold);}
.type-文化{color:var(--red);}
.type-鼓励{color:var(--green);}
.type-其他{color:var(--blue);}
.anno-border-语用{border-left-color:var(--purple);}
.anno-border-逻辑{border-left-color:var(--gold);}
.anno-border-文化{border-left-color:var(--red);}
.anno-border-鼓励{border-left-color:var(--green);}
.anno-border-其他{border-left-color:var(--blue);}
.anno-del{position:absolute;top:.5rem;right:.6rem;background:none;border:none;color:#ccc;cursor:pointer;font-size:1rem;}
.anno-del:hover{color:var(--red);}

/* Modal footer */
.modal-footer{
  display:flex;gap:.7rem;padding:1rem 1.3rem;border-top:1px solid var(--border);
  background:var(--card);flex-wrap:wrap;align-items:center;
}
.return-btn{
  padding:.75rem 1.5rem;background:var(--green);color:#fff;border:none;
  border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;
}
.return-btn:hover{background:#1e8449;}
.save-btn{
  padding:.75rem 1.2rem;background:var(--teal);color:#fff;border:none;
  border-radius:10px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;
}
.modal-status{font-size:.82rem;color:var(--muted);margin-left:auto;}

/* ── Analytics ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--card);border-radius:14px;padding:1.2rem;box-shadow:var(--shadow);text-align:center;}
.stat-val{font-size:2rem;font-weight:700;color:var(--teal);}
.stat-label{font-size:.8rem;color:var(--muted);margin-top:.2rem;}

.chart-card{background:var(--card);border-radius:14px;padding:1.3rem;box-shadow:var(--shadow);margin-bottom:1rem;}
.chart-title{font-size:.9rem;font-weight:600;margin-bottom:1rem;color:var(--text);}
.bar-chart{display:flex;flex-direction:column;gap:.6rem;}
.bar-row{display:flex;align-items:center;gap:.8rem;font-size:.85rem;}
.bar-name{width:80px;text-align:right;color:var(--muted);font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-wrap{flex:1;background:var(--bg);border-radius:4px;height:22px;overflow:hidden;}
.bar-fill{height:100%;background:var(--teal);border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding-left:6px;}
.bar-fill span{color:#fff;font-size:.74rem;font-weight:600;white-space:nowrap;}
.bar-total{width:30px;font-size:.8rem;color:var(--muted);}

.progress-table{width:100%;border-collapse:collapse;font-size:.88rem;}
.progress-table th{text-align:left;padding:.5rem .8rem;color:var(--muted);font-size:.78rem;border-bottom:1px solid var(--border);}
.progress-table td{padding:.6rem .8rem;border-bottom:1px solid var(--border);}
.progress-table tr:last-child td{border-bottom:none;}
.delta-up{color:var(--green);font-weight:600;}
.delta-down{color:var(--red);}
.delta-same{color:var(--muted);}

.empty-state{text-align:center;padding:3rem;color:var(--muted);}
.empty-icon{font-size:2.5rem;margin-bottom:.8rem;}

/* loading spinner */
.spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .sidebar{transform:translateX(-100%);transition:transform .25s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .modal-body{grid-template-columns:1fr;}
  .modal-col{max-height:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:.5rem;">👩‍🏫</div>
    <h1>教师后台</h1>
    <p>华文写作批改系统 · Teacher Dashboard</p>
    <input class="login-input" type="password" id="loginPwd" placeholder="请输入教师密码" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-err" id="loginErr">密码错误，请重试。</div>
  </div>
</div>

<!-- ── APP ── -->
<div class="app" id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-title">✍️ 华文批改 · 教师后台</div>
    <span class="topbar-badge" id="pendingBadge">待批改 0</span>
    <button class="topbar-logout" onclick="logout()">退出</button>
  </div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="nav-section">主要功能</div>
    <div class="nav-item active" onclick="showPage('inbox')" id="nav-inbox">
      📥 批改收件箱 <span class="nav-count" id="sidebarCount" style="display:none">0</span>
    </div>
    <div class="nav-item" onclick="showPage('analytics')" id="nav-analytics">
      📊 数据分析
    </div>
    <div class="nav-section">设置</div>
    <div class="nav-item" onclick="showPage('templates')" id="nav-templates">
      💬 评语模板
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- INBOX PAGE -->
    <div class="page active" id="page-inbox">
      <div class="page-title">📥 批改收件箱</div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('pending')" id="tab-pending">待批改 <span id="cnt-pending">0</span></button>
        <button class="tab-btn" onclick="switchTab('reviewed')" id="tab-reviewed">已批改 <span id="cnt-reviewed">0</span></button>
        <button class="tab-btn" onclick="switchTab('returned')" id="tab-returned">已发回 <span id="cnt-returned">0</span></button>
        <button class="tab-btn" onclick="switchTab('all')" id="tab-all">全部</button>
      </div>
      <div class="sub-list" id="subList">
        <div class="empty-state"><div class="empty-icon">📭</div>暂无提交</div>
      </div>
    </div>

    <!-- ANALYTICS PAGE -->
    <div class="page" id="page-analytics">
      <div class="page-title">📊 数据分析</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-val" id="stat-total">0</div><div class="stat-label">总提交数</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-students">0</div><div class="stat-label">学生人数</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-draft2">0</div><div class="stat-label">提交二稿</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-avg">—</div><div class="stat-label">平均总分</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">学生提交次数排行</div>
        <div class="bar-chart" id="barChart"><div style="color:var(--muted);font-size:.88rem;">暂无数据</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">一稿 → 二稿 进步对比</div>
        <table class="progress-table">
          <thead><tr><th>学生</th><th>一稿总分</th><th>二稿总分</th><th>变化</th><th>反馈模式</th></tr></thead>
          <tbody id="progressTable"><tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1.5rem;">暂无二稿数据</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- TEMPLATES PAGE -->
    <div class="page" id="page-templates">
      <div class="page-title">💬 常用评语模板</div>
      <div style="background:var(--card);border-radius:14px;padding:1.3rem;box-shadow:var(--shadow);">
        <div style="font-size:.88rem;color:var(--muted);margin-bottom:1rem;">点击模板可复制，也可以添加自己的常用评语。</div>
        <div id="templateList" style="display:flex;flex-direction:column;gap:.6rem;"></div>
        <div style="margin-top:1.2rem;display:flex;gap:.7rem;">
          <input id="newTemplate" style="flex:1;padding:.7rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.9rem;outline:none;" placeholder="输入新的评语模板…" />
          <select id="newTemplateType" style="padding:.7rem;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.88rem;outline:none;">
            <option>语用</option><option>逻辑</option><option>文化</option><option>鼓励</option><option>其他</option>
          </select>
          <button onclick="addTemplate()" style="padding:.7rem 1.2rem;background:var(--teal);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.88rem;cursor:pointer;">添加</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── ANNOTATION MODAL ── -->
<div class="modal-overlay" id="annoModal">
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="modalTitle">批改作文</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Left: essay + AI feedback -->
      <div class="modal-col">
        <div class="col-title">学生作文</div>
        <div class="essay-text" id="modalEssay"></div>
        <div style="margin-top:1rem;">
          <div class="col-title">AI 表层批改</div>
          <div class="ai-feedback-box" id="modalAiFeedback"></div>
        </div>
        <div style="margin-top:.8rem;display:flex;gap:.5rem;flex-wrap:wrap;" id="modalScores"></div>
      </div>
      <!-- Right: teacher annotations -->
      <div class="modal-col">
        <div class="col-title">教师深层批注</div>

        <!-- Templates quick insert -->
        <div style="margin-bottom:.6rem;font-size:.8rem;color:var(--muted);">常用评语快速插入：</div>
        <div class="template-row" id="modalTemplates"></div>

        <!-- Annotation type -->
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:.4rem;">批注类型：</div>
        <div class="anno-type-row">
          <button class="anno-type-btn" onclick="selectType(this,'语用')">🗣 语用</button>
          <button class="anno-type-btn" onclick="selectType(this,'逻辑')">🧠 逻辑</button>
          <button class="anno-type-btn" onclick="selectType(this,'文化')">🏮 文化</button>
          <button class="anno-type-btn" onclick="selectType(this,'鼓励')">⭐ 鼓励</button>
          <button class="anno-type-btn" onclick="selectType(this,'其他')">📝 其他</button>
        </div>
        <textarea class="anno-textarea" id="annoText" placeholder="在此输入批注内容…&#10;&#10;例如：「去学校」在华文里习惯说「上学校」，注意语言使用习惯。"></textarea>
        <button class="anno-add-btn" onclick="addAnnotation()">＋ 添加批注</button>

        <!-- Annotation list -->
        <div class="anno-list" id="annoList"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="save-btn" onclick="saveAnnotations()">💾 保存批注</button>
      <button class="return-btn" onclick="returnToStudent()">📤 发回学生</button>
      <div class="modal-status" id="modalStatus"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  CONFIG — 填入你的 Supabase 信息
// ══════════════════════════════════════
const SUPABASE_URL  = "https://joeuvvmsbskfpmqydogs.supabase.co";
const SUPABASE_KEY  = "sb_publishable_VL1jCjssrRIwSrDVPnfrzQ_QQkabVwG";
const TEACHER_PASSWORD = "grace2026"; // ← 可以改成你自己的密码

// ══════════════════════════════════════
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allSubmissions = [];
let currentTab = 'pending';
let currentSub = null;
let currentAnnotations = [];
let selectedType = '语用';

let templates = JSON.parse(localStorage.getItem('anno_templates') || '[]');
if (templates.length === 0) {
  templates = [
    { type:'语用', text:'这个表达在日常华文对话中不太自然，可以改成更地道的说法。' },
    { type:'语用', text:'注意书面语和口语的区别，这里用书面表达会更恰当。' },
    { type:'逻辑', text:'这一段和上一段的衔接不够紧密，可以加一个过渡句。' },
    { type:'逻辑', text:'论点和例子之间的关系不够清晰，建议先提观点再举例。' },
    { type:'文化', text:'这个表达有文化背景，在新加坡华文语境中有特定含义。' },
    { type:'文化', text:'可以尝试用更多华文成语或惯用语来丰富表达。' },
    { type:'鼓励', text:'用词有进步！继续保持这种认真的态度。' },
    { type:'鼓励', text:'这个想法很有创意，可以在二稿中进一步展开。' },
  ];
  localStorage.setItem('anno_templates', JSON.stringify(templates));
}

// ── Auth ──
function doLogin() {
  const pwd = document.getElementById('loginPwd').value;
  if (pwd === TEACHER_PASSWORD) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadSubmissions();
    renderTemplatesPage();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}
function logout() {
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPwd').value = '';
}

// ── Navigation ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'analytics') renderAnalytics();
}

// ── Load submissions ──
async function loadSubmissions() {
  const { data, error } = await sb
    .from('submissions')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { console.error(error); return; }
  allSubmissions = data || [];
  renderInbox();
  updateCounts();
}

function updateCounts() {
  const pending  = allSubmissions.filter(s => s.status === 'pending').length;
  const reviewed = allSubmissions.filter(s => s.status === 'reviewed').length;
  const returned = allSubmissions.filter(s => s.status === 'returned').length;
  document.getElementById('cnt-pending').textContent  = pending;
  document.getElementById('cnt-reviewed').textContent = reviewed;
  document.getElementById('cnt-returned').textContent = returned;
  document.getElementById('pendingBadge').textContent = `待批改 ${pending}`;
  const sc = document.getElementById('sidebarCount');
  if (pending > 0) { sc.style.display = 'inline'; sc.textContent = pending; }
  else sc.style.display = 'none';
}

// ── Inbox ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderInbox();
}

function renderInbox() {
  const filtered = currentTab === 'all'
    ? allSubmissions
    : allSubmissions.filter(s => s.status === currentTab);
  const list = document.getElementById('subList');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>暂无记录</div>';
    return;
  }
  list.innerHTML = filtered.map(s => {
    const d = new Date(s.created_at);
    const time = d.toLocaleDateString('zh-SG') + ' ' + d.toLocaleTimeString('zh-SG', {hour:'2-digit',minute:'2-digit'});
    const statusMap = { pending:'tag-pending', reviewed:'tag-reviewed', returned:'tag-returned' };
    const statusLabel = { pending:'待批改', reviewed:'已批改', returned:'已发回' };
    const scores = s.score_accuracy || s.score_fluency || s.score_content
      ? `<div class="sub-scores">
          <span class="score-pill">准确性 ${s.score_accuracy ?? '—'}</span>
          <span class="score-pill">流利度 ${s.score_fluency ?? '—'}</span>
          <span class="score-pill">内容 ${s.score_content ?? '—'}</span>
        </div>` : '';
    return `
      <div class="sub-card ${s.status}" onclick="openModal('${s.id}')">
        <div class="sub-card-top">
          <span class="sub-name">${s.student_name || '匿名'}</span>
          <span class="sub-draft-badge ${s.draft === 2 ? 'draft2-badge' : 'draft1-badge'}">
            ${s.draft === 2 ? '二稿' : '一稿'}
          </span>
          <span class="sub-mode">${modeLabel(s.mode)}</span>
          <span class="status-tag ${statusMap[s.status]}">${statusLabel[s.status]}</span>
          <span class="sub-time">${time}</span>
        </div>
        <div class="sub-preview">${(s.essay || '').slice(0, 80)}…</div>
        ${scores}
      </div>`;
  }).join('');
}

function modeLabel(m) {
  return { ai:'🤖 AI', teacher:'👩‍🏫 教师', hybrid:'🤝 协同' }[m] || m || '';
}

// ── Modal ──
function openModal(id) {
  currentSub = allSubmissions.find(s => s.id === id);
  if (!currentSub) return;
  currentAnnotations = currentSub.teacher_annotations
    ? JSON.parse(JSON.stringify(currentSub.teacher_annotations))
    : [];

  document.getElementById('modalTitle').textContent =
    `${currentSub.student_name || '匿名'} · ${currentSub.draft === 2 ? '二稿' : '一稿'} · ${modeLabel(currentSub.mode)}`;
  document.getElementById('modalEssay').textContent = currentSub.essay || '';
  document.getElementById('modalAiFeedback').innerHTML = renderMarkdown(currentSub.ai_feedback || '暂无AI反馈');

  const sc = document.getElementById('modalScores');
  sc.innerHTML = [
    { label:'准确性', val: currentSub.score_accuracy },
    { label:'流利度', val: currentSub.score_fluency },
    { label:'内容',   val: currentSub.score_content },
  ].map(s => s.val != null
    ? `<span style="padding:.25rem .7rem;background:var(--teal-light);color:var(--teal);border-radius:8px;font-size:.82rem;">${s.label} ${s.val}/10</span>`
    : ''
  ).join('');

  renderModalTemplates();
  renderAnnoList();
  document.getElementById('modalStatus').textContent = '';
  document.getElementById('annoModal').classList.add('visible');
}

function closeModal() {
  document.getElementById('annoModal').classList.remove('visible');
  currentSub = null;
}

// ── Annotation type ──
function selectType(btn, type) {
  document.querySelectorAll('.anno-type-btn').forEach(b => {
    b.className = 'anno-type-btn';
  });
  btn.classList.add('sel-' + type);
  selectedType = type;
}

function addAnnotation() {
  const text = document.getElementById('annoText').value.trim();
  if (!text) return;
  currentAnnotations.push({ type: selectedType, text, id: Date.now() });
  document.getElementById('annoText').value = '';
  renderAnnoList();
}

function deleteAnnotation(id) {
  currentAnnotations = currentAnnotations.filter(a => a.id !== id);
  renderAnnoList();
}

function renderAnnoList() {
  const list = document.getElementById('annoList');
  if (currentAnnotations.length === 0) {
    list.innerHTML = '<div style="font-size:.84rem;color:var(--muted);">还没有批注，选择类型后输入内容并点击「添加批注」。</div>';
    return;
  }
  list.innerHTML = currentAnnotations.map(a => `
    <div class="anno-item anno-border-${a.type}">
      <div class="anno-item-type type-${a.type}">● ${a.type}</div>
      ${a.text}
      <button class="anno-del" onclick="deleteAnnotation(${a.id})">✕</button>
    </div>`).join('');
}

// ── Templates ──
function renderModalTemplates() {
  const row = document.getElementById('modalTemplates');
  row.innerHTML = templates.slice(0, 6).map(t =>
    `<span class="template-chip" onclick="insertTemplate('${t.text.replace(/'/g,"\\'")}','${t.type}')">${t.type}：${t.text.slice(0,18)}…</span>`
  ).join('');
}

function insertTemplate(text, type) {
  document.getElementById('annoText').value = text;
  const btn = [...document.querySelectorAll('.anno-type-btn')].find(b => b.textContent.includes(type));
  if (btn) selectType(btn, type);
}

function renderTemplatesPage() {
  const list = document.getElementById('templateList');
  list.innerHTML = templates.map((t, i) => `
    <div style="display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;background:var(--bg);border-radius:8px;">
      <span style="padding:.15rem .55rem;border-radius:8px;font-size:.75rem;font-weight:600;background:var(--teal-light);color:var(--teal);">${t.type}</span>
      <span style="flex:1;font-size:.88rem;">${t.text}</span>
      <button onclick="deleteTemplate(${i})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:.9rem;">✕</button>
    </div>`).join('');
}

function addTemplate() {
  const text = document.getElementById('newTemplate').value.trim();
  const type = document.getElementById('newTemplateType').value;
  if (!text) return;
  templates.push({ type, text });
  localStorage.setItem('anno_templates', JSON.stringify(templates));
  document.getElementById('newTemplate').value = '';
  renderTemplatesPage();
}

function deleteTemplate(i) {
  templates.splice(i, 1);
  localStorage.setItem('anno_templates', JSON.stringify(templates));
  renderTemplatesPage();
}

// ── Save & Return ──
async function saveAnnotations() {
  if (!currentSub) return;
  const status = document.getElementById('modalStatus');
  status.textContent = '保存中…';
  const { error } = await sb.from('submissions').update({
    teacher_annotations: currentAnnotations,
    status: 'reviewed',
  }).eq('id', currentSub.id);
  if (error) { status.textContent = '保存失败：' + error.message; return; }
  currentSub.teacher_annotations = currentAnnotations;
  currentSub.status = 'reviewed';
  allSubmissions = allSubmissions.map(s => s.id === currentSub.id ? currentSub : s);
  updateCounts();
  renderInbox();
  status.textContent = '✓ 已保存';
}

async function returnToStudent() {
  if (!currentSub) return;
  await saveAnnotations();
  const { error } = await sb.from('submissions').update({ status: 'returned' }).eq('id', currentSub.id);
  if (error) { document.getElementById('modalStatus').textContent = '发送失败'; return; }
  currentSub.status = 'returned';
  allSubmissions = allSubmissions.map(s => s.id === currentSub.id ? currentSub : s);
  updateCounts();
  renderInbox();
  document.getElementById('modalStatus').textContent = '✓ 已发回学生';
  setTimeout(closeModal, 1200);
}

// ── Analytics ──
function renderAnalytics() {
  const total    = allSubmissions.length;
  const students = [...new Set(allSubmissions.map(s => s.student_name).filter(Boolean))].length;
  const draft2   = allSubmissions.filter(s => s.draft === 2).length;
  const scored   = allSubmissions.filter(s => s.score_accuracy != null);
  const avg      = scored.length > 0
    ? (scored.reduce((a,s) => a + (s.score_accuracy||0) + (s.score_fluency||0) + (s.score_content||0), 0) / scored.length).toFixed(1)
    : '—';

  document.getElementById('stat-total').textContent    = total;
  document.getElementById('stat-students').textContent = students;
  document.getElementById('stat-draft2').textContent   = draft2;
  document.getElementById('stat-avg').textContent      = avg;

  // Bar chart: submissions per student
  const countMap = {};
  allSubmissions.forEach(s => { const n = s.student_name || '匿名'; countMap[n] = (countMap[n]||0)+1; });
  const sorted = Object.entries(countMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxCount = Math.max(...sorted.map(e=>e[1]), 1);
  document.getElementById('barChart').innerHTML = sorted.length
    ? sorted.map(([name,count]) => `
        <div class="bar-row">
          <div class="bar-name">${name}</div>
          <div class="bar-wrap">
            <div class="bar-fill" style="width:${count/maxCount*100}%">
              <span>${count}</span>
            </div>
          </div>
        </div>`).join('')
    : '<div style="color:var(--muted);font-size:.88rem;">暂无数据</div>';

  // Progress table
  const sessionMap = {};
  allSubmissions.forEach(s => {
    if (!s.session_id) return;
    if (!sessionMap[s.session_id]) sessionMap[s.session_id] = {};
    sessionMap[s.session_id][`draft${s.draft}`] = s;
  });
  const pairs = Object.values(sessionMap).filter(v => v.draft1 && v.draft2);
  const tbody = document.getElementById('progressTable');
  tbody.innerHTML = pairs.length
    ? pairs.map(p => {
        const s1 = (p.draft1.score_accuracy||0)+(p.draft1.score_fluency||0)+(p.draft1.score_content||0);
        const s2 = (p.draft2.score_accuracy||0)+(p.draft2.score_fluency||0)+(p.draft2.score_content||0);
        const diff = s2 - s1;
        const cls = diff > 0 ? 'delta-up' : diff < 0 ? 'delta-down' : 'delta-same';
        const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
        return `<tr>
          <td>${p.draft1.student_name||'匿名'}</td>
          <td>${s1}/30</td><td>${s2}/30</td>
          <td class="${cls}">${arrow} ${Math.abs(diff)}</td>
          <td>${modeLabel(p.draft1.mode)}</td>
        </tr>`;
      }).join('')
    : '<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:1.5rem;">暂无二稿数据</td></tr>';
}

// ── Helpers ──
function renderMarkdown(text) {
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/【(.+?)】/g,'<h3 style="color:var(--teal);font-size:.88rem;margin:.7rem 0 .2rem;">【$1】</h3>')
    .replace(/\n/g,'<br>');
}

// Auto-refresh every 30 seconds
setInterval(loadSubmissions, 30000);
</script>
